<!DOCTYPE html>
<html>
<head>

<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</helmet>
<div style="min-width:100%; min-height:100vh; box-sizing:border-box; padding:56px; background:#0f1115; width:max-content; font-family:'Fredoka',sans-serif;">

  <div style="margin-bottom:48px;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#6b7280;">Brand mark · final</div>
    <div style="font-size:36px; font-weight:600; color:#f3f4f6; margin-top:10px; letter-spacing:-0.01em;">MathsMap</div>
    <div style="font-size:15px; color:#9ca3af; margin-top:6px; max-width:520px;">M-graph: a network shaped into an M, the node where concepts meet highlighted in the accent.</div>
  </div>

  <div style="display:flex; gap:36px; align-items:flex-start;">

    <!-- HERO MARK -->
    <div style="flex:none; width:336px;">
      <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#7c8190; margin-bottom:14px;">The mark</div>

          <line x1="10" y1="38" x2="10" y2="13" stroke="#11131a" stroke-width="2.1" stroke-linecap="round"/>
          <line x1="10" y1="13" x2="24" y2="27" stroke="#11131a" stroke-width="2.1" stroke-linecap="round"/>
          <line x1="24" y1="27" x2="38" y2="13" stroke="#11131a" stroke-width="2.1" stroke-linecap="round"/>
          <line x1="38" y1="13" x2="38" y2="38" stroke="#11131a" stroke-width="2.1" stroke-linecap="round"/>
          <circle cx="10" cy="13" r="4.2" fill="#fafaf8" stroke="#11131a" stroke-width="2.1"/>

          <circle cx="24" cy="27" r="4.2" fill="#E8443A"/>

          <circle cx="38" cy="38" r="4.2" fill="#fafaf8" stroke="#11131a" stroke-width="2.1"/>
        </svg>
      </div>
    </div>

        </div>
        <div style="padding:34px; display:flex; align-items:flex-end; justify-content:center; gap:26px; background:#11131a; border-top:1px solid #ececec;">
          <svg width="64" height="64" viewBox="0 0 48 48" fill="none"><line x1="10" y1="38" x2="10" y2="13" stroke="#f3f4f6" stroke-width="2.1" stroke-linecap="round"/><line x1="10" y1="13" x2="24" y2="27" stroke="#f3f4f6" stroke-width="2.1" stroke-linecap="round"/><line x1="24" y1="27" x2="38" y2="13" stroke="#f3f4f6" stroke-width="2.1" stroke-linecap="round"/><line x1="38" y1="13" x2="38" y2="38" stroke="#f3f4f6" stroke-width="2.1" stroke-linecap="round"/><circle cx="10" cy="13" r="4.2" fill="#11131a" stroke="#f3f4f6" stroke-width="2.1"/><circle cx="38" cy="13" r="4.2" fill="#11131a" stroke="#f3f4f6" stroke-width="2.1"/><circle cx="24" cy="27" r="4.2" fill="#E8443A"/><circle cx="10" cy="38" r="4.2" fill="#11131a" stroke="#f3f4f6" stroke-width="2.1"/><circle cx="38" cy="38" r="4.2" fill="#11131a" stroke="#f3f4f6" stroke-width="2.1"/></svg>

          <svg width="24" height="24" viewBox="0 0 48 48" fill="none"><line x1="10" y1="38" x2="10" y2="13" stroke="#f3f4f6" stroke-width="2.8" stroke-linecap="round"/><line x1="10" y1="13" x2="24" y2="27" stroke="#f3f4f6" stroke-width="2.8" stroke-linecap="round"/><line x1="24" y1="27" x2="38" y2="13" stroke="#f3f4f6" stroke-width="2.8" stroke-linecap="round"/><line x1="38" y1="13" x2="38" y2="38" stroke="#f3f4f6" stroke-width="2.8" stroke-linecap="round"/><circle cx="10" cy="13" r="4.6" fill="#11131a" stroke="#f3f4f6" stroke-width="2.8"/><circle cx="38" cy="13" r="4.6" fill="#11131a" stroke="#f3f4f6" stroke-width="2.8"/><circle cx="24" cy="27" r="4.6" fill="#E8443A"/><circle cx="10" cy="38" r="4.6" fill="#11131a" stroke="#f3f4f6" stroke-width="2.8"/><circle cx="38" cy="38" r="4.6" fill="#11131a" stroke="#f3f4f6" stroke-width="2.8"/></svg>
        </div>
      </div>
    </div>

    <!-- App tile / favicon -->
    <div style="flex:none; width:336px;">
      <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#7c8190; margin-bottom:14px;">App tile</div>
      <div style="background:#fafaf8; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.4); padding:44px; display:flex; align-items:center; justify-content:center; gap:28px;">

        </div>
        <div style="width:120px; height:120px; border-radius:27px; background:#E8443A; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(0,0,0,.28);">

        </div>

  </div>

  <!-- lockups -->
  <div style="margin-top:36px; display:flex; gap:36px; align-items:flex-start;">
    <div style="flex:none; width:516px;">
      <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#7c8190; margin-bottom:14px;">Lockup · light</div>
      <div style="background:#fafaf8; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.4); padding:34px; display:flex; align-items:center; gap:16px;">
        <svg width="42" height="42" viewBox="0 0 48 48" fill="none"><line x1="10" y1="38" x2="10" y2="13" stroke="#11131a" stroke-width="2.4" stroke-linecap="round"/><line x1="10" y1="13" x2="24" y2="27" stroke="#11131a" stroke-width="2.4" stroke-linecap="round"/><line x1="24" y1="27" x2="38" y2="13" stroke="#11131a" stroke-width="2.4" stroke-linecap="round"/><line x1="38" y1="13" x2="38" y2="38" stroke="#11131a" stroke-width="2.4" stroke-linecap="round"/><circle cx="10" cy="13" r="4.2" fill="#fafaf8" stroke="#11131a" stroke-width="2.4"/><circle cx="38" cy="13" r="4.2" fill="#fafaf8" stroke="#11131a" stroke-width="2.4"/><circle cx="24" cy="27" r="4.2" fill="#E8443A"/><circle cx="10" cy="38" r="4.2" fill="#fafaf8" stroke="#11131a" stroke-width="2.4"/><circle cx="38" cy="38" r="4.2" fill="#fafaf8" stroke="#11131a" stroke-width="2.4"/></svg>

    </div>
    <div style="flex:none; width:516px;">
      <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#7c8190; margin-bottom:14px;">Lockup · dark</div>
      <div style="background:#11131a; border-radius:2px; box-shadow:0 1px 3px rgba(0,0,0,.4); padding:34px; display:flex; align-items:center; gap:16px;">

</div>
