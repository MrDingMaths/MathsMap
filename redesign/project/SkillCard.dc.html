<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; width:100%; height:100%; box-sizing:border-box; background:#ffffff; border-radius:16px; padding:17px 18px; cursor:pointer; box-shadow:0 12px 30px -18px rgba(2,8,23,.65); transition:transform .16s, box-shadow .16s;" style-hover="transform:translateY(-3px); box-shadow:0 20px 38px -18px rgba(2,8,23,.8);">
  <div style="display:flex; align-items:center; gap:7px; margin-bottom:11px;">
    <span style="width:7px; height:7px; border-radius:50%; flex:none; background:{{ data.color }};"></span>
    <span style="font:600 10px/1 'Geist Mono'; letter-spacing:.06em; text-transform:uppercase; color:{{ data.color }};">{{ data.reason }}</span>
  </div>
  <h3 style="margin:0 0 7px; font:700 16px/1.25 'Hanken Grotesk'; color:#0f172a; text-wrap:balance;">{{ data.name }}</h3>
  <p style="margin:0 0 16px; font:400 12.5px/1.45 'Hanken Grotesk'; color:#64748b; text-wrap:pretty;">{{ data.blurb }}</p>
  <div style="margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px;">
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
      <sc-for list="{{ data.tags }}" as="tag" hint-placeholder-count="2">
        <span style="font:600 10.5px/1 'Geist Mono'; letter-spacing:.02em; color:#475569; background:#f1f5f9; border-radius:99px; padding:5px 9px;">{{ tag }}</span>
      </sc-for>
    </div>
    <span style="font:700 18px/1 'Hanken Grotesk'; color:#0ea5e9; flex:none;">&rarr;</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:280,&quot;height&quot;:190},&quot;data&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;,&quot;default&quot;:{&quot;name&quot;:&quot;Solving linear equations&quot;,&quot;blurb&quot;:&quot;Isolate the unknown across one- and two-step equations.&quot;,&quot;reason&quot;:&quot;Up next for you&quot;,&quot;color&quot;:&quot;#2563eb&quot;,&quot;tags&quot;:[&quot;Stage 5&quot;,&quot;Advanced&quot;]}}}"></script>
</body>
</html>
