<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; position:relative; width:100%; height:100%; box-sizing:border-box; background:{{ data.tintBg }}; border:1px solid #e7ebf1; border-radius:14px; padding:15px 16px 14px; cursor:pointer; transition:border-color .15s, box-shadow .15s, transform .15s;" style-hover="border-color:#c9d3e2; box-shadow:0 10px 24px -14px rgba(15,23,42,.28); transform:translateY(-2px);">
  <sc-if value="{{ data.isFullyMastered }}">
    <div style="position:absolute; top:12px; right:12px; width:18px; height:18px; border-radius:50%; background:#10b981; display:grid; place-items:center;">
      <svg width="9" height="7" viewBox="0 0 9 7" fill="none"><polyline points="1,3.5 3.5,6 8,1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline></svg>
    </div>
  </sc-if>
  <h3 style="margin:0 0 14px; font:600 15.5px/1.3 'Hanken Grotesk'; color:#0f172a; text-wrap:balance;">{{ data.name }}</h3>
  <div style="margin-top:auto;">
    <div style="display:flex; justify-content:flex-end; margin-bottom:7px;">
      <span style="font:600 11.5px/1 'Geist Mono'; color:{{ data.statusColor }};">{{ data.masteredLabel }}</span>
    </div>
    <div style="height:5px; border-radius:99px; background:rgba(0,0,0,.07); overflow:hidden; display:flex; gap:1.5px;">
      <span style="display:block; height:100%; width:{{ data.masteredPct }}; background:#10b981;"></span>
      <span style="display:block; height:100%; width:{{ data.inProgressPct }}; background:#fbbf24;"></span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:248,&quot;height&quot;:150},&quot;data&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;,&quot;default&quot;:{&quot;name&quot;:&quot;Solving linear equations&quot;,&quot;strandShort&quot;:&quot;Algebra&quot;,&quot;color&quot;:&quot;#2563eb&quot;,&quot;skillLabel&quot;:&quot;12 skills&quot;,&quot;masteredLabel&quot;:&quot;8/12&quot;,&quot;statusColor&quot;:&quot;#0f9d6e&quot;,&quot;masteredPct&quot;:&quot;66%&quot;,&quot;inProgressPct&quot;:&quot;17%&quot;,&quot;tintBg&quot;:&quot;rgb(240,244,254)&quot;,&quot;isFullyMastered&quot;:false}}}"></script>
</body>
</html>
